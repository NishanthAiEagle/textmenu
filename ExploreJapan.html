<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Explore Japan · Sakura Dining</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- ✅ model-viewer loaded as module -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        :root {
            --ink: #080604;
            --paper: #F0E8D5;
            --yama: #B8973A;
            --yama2: #D4AE52;
            --ff-en: 'Cormorant Garamond', serif;
            --ff-ui: 'DM Sans', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--ink);
            color: var(--paper);
            font-family: var(--ff-ui);
            height: 100svh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ─── Header ─────────────────────────────── */
        .nav-header {
            padding: max(env(safe-area-inset-top), 20px) 20px 16px;
            text-align: center;
            border-bottom: 1px solid rgba(184,151,58,0.2);
            flex-shrink: 0;
        }
        .nav-header h1 {
            font-family: var(--ff-en);
            font-size: clamp(24px, 6vw, 36px);
            margin: 0;
            color: var(--yama2);
            letter-spacing: 0.1em;
        }
        .nav-header p {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0.5;
            margin: 4px 0 0;
        }

        /* ─── Scroll Grid ─────────────────────────── */
        .explorer-grid {
            flex: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 20px 16px;
            gap: 16px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
            scrollbar-width: none;
        }
        .explorer-grid::-webkit-scrollbar { display: none; }

        /* ─── Card ────────────────────────────────── */
        .landmark-card {
            flex: 0 0 min(85vw, 360px);
            height: min(62vh, 520px);
            background: #0e0c0a;
            border: 1px solid rgba(184,151,58,0.25);
            border-radius: 14px;
            position: relative;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            will-change: transform;
            transform: translateZ(0);
        }

        /* ─── Model wrap ──────────────────────────── */
        .model-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 60%, #1a150a 0%, #080604 100%);
        }

        /* Static PNG thumbnail */
        .model-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 1;
        }

        /*
         * ✅ AR FIX: model-viewer MUST be visible & sized in the DOM
         * for activateAR() to work as a direct gesture on Android.
         * We hide it visually but keep it in layout using opacity + pointer-events.
         * Position absolute so it doesn't push the poster image.
         */
        model-viewer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            /* Visually hidden but fully present in DOM */
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }

        /* Hide model-viewer's built-in UI chrome */
        model-viewer::part(default-progress-bar) { display: none; }
        model-viewer::part(default-ar-button)     { display: none; }

        /* ─── AR-Ready Badge ──────────────────────── */
        .ar-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(8,6,4,0.75);
            border: 1px solid var(--yama);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 9px;
            letter-spacing: 0.15em;
            color: var(--yama2);
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 0.4s, transform 0.4s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
            z-index: 5;
        }
        .ar-badge.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ─── Loading overlay (shown while GLB downloads) ── */
        .ar-loading {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(8,6,4,0.8);
            z-index: 20;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .ar-loading.show { display: flex; }

        .loader-ring {
            width: 38px;
            height: 38px;
            border: 2px solid rgba(184,151,58,0.15);
            border-top-color: var(--yama2);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        .loader-label {
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--yama);
            opacity: 0.85;
        }
        .loader-bar-track {
            width: 100px;
            height: 2px;
            background: rgba(184,151,58,0.12);
            border-radius: 2px;
            overflow: hidden;
        }
        .loader-bar-fill {
            height: 100%;
            background: var(--yama2);
            width: 0%;
            border-radius: 2px;
            transition: width 0.15s ease;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Info Panel ──────────────────────────── */
        .landmark-info {
            padding: 16px;
            background: rgba(12,10,8,0.95);
            border-top: 1px solid rgba(184,151,58,0.12);
            flex-shrink: 0;
        }
        .landmark-name {
            font-family: var(--ff-en);
            font-size: clamp(20px, 5vw, 26px);
            color: var(--paper);
            margin-bottom: 2px;
            line-height: 1.1;
        }
        .landmark-city {
            font-size: 9px;
            color: var(--yama);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        /* ─── AR Button ───────────────────────────── */
        .ar-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--yama) 0%, var(--yama2) 100%);
            border: none;
            padding: 13px;
            border-radius: 8px;
            color: var(--ink);
            font-weight: 600;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.15s;
            min-height: 44px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .ar-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }
        .ar-btn:active::after { background: rgba(255,255,255,0.15); }
        .ar-btn:active        { transform: scale(0.97); }
        .ar-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── Back Button ─────────────────────────── */
        .back-btn {
            position: fixed;
            top: max(env(safe-area-inset-top), 14px);
            left: 16px;
            background: rgba(240,232,213,0.08);
            border: 1px solid rgba(240,232,213,0.18);
            color: var(--paper);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 10px;
            text-decoration: none;
            z-index: 200;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            letter-spacing: 0.05em;
            min-height: 36px;
            display: flex;
            align-items: center;
        }

        /* ─── Scroll dots ─────────────────────────── */
        .scroll-dots {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 10px 0 max(env(safe-area-inset-bottom), 14px);
        }
        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: rgba(184,151,58,0.25);
            transition: background 0.3s, transform 0.3s;
        }
        .dot.active {
            background: var(--yama2);
            transform: scale(1.3);
        }
    </style>
</head>
<body>

    <a href="FunZone.html" class="back-btn">← Back</a>

    <div class="nav-header">
        <h1>Explore Japan</h1>
        <p>Augmented Reality Landmarks</p>
    </div>

    <div class="explorer-grid" id="grid"></div>
    <div class="scroll-dots" id="dots"></div>

    <script>
        const landmarks = [
            { name: "Tokyo Skytree",       city: "Tokyo",  folder: "tokyoskytree",       file: "tokyoskytree",        hasUsdz: true  },
            { name: "Japanese Torii Gate", city: "Japan",  folder: "Japanese Torii Gate", file: "Japanese Torii Gate", hasUsdz: true  },
            { name: "Japanese Castle",     city: "Japan",  folder: "japanesecastle",       file: "japanesecastle",      hasUsdz: true  },
            { name: "Nijo Castle",         city: "Kyoto",  folder: "Nijo Castle japan",    file: "Nijo Castle japan",   hasUsdz: false },
            { name: "Pagoda",              city: "Japan",  folder: "pagoda",               file: "pagoda",              hasUsdz: true  },
            { name: "Kimono Dress",        city: "Japan",  folder: "dress",                file: "dress",               hasUsdz: true  },
        ];

        const grid   = document.getElementById('grid');
        const dotsEl = document.getElementById('dots');

        // ✅ Detect iOS for USDZ Quick Look
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        landmarks.forEach((l, i) => {
            const base     = `ExploreJapan/${l.folder}/${l.file}`;
            const glbPath  = `${base}.glb`;
            const usdzPath = `${base}.usdz`;
            const pngPath  = `${base}.png`;

            const card = document.createElement('div');
            card.className = 'landmark-card';
            card.dataset.index = i;

            card.innerHTML = `
                <div class="model-wrap">

                    <!-- Static PNG — instant thumbnail, zero 3D cost -->
                    <img
                        class="model-poster"
                        src="${pngPath}"
                        alt="${l.name}"
                        loading="${i === 0 ? 'eager' : 'lazy'}"
                    >

                    <!--
                        ✅ AR FIXES applied:
                        • loading="eager" on first card, "lazy" on rest — GLB starts
                          downloading early so AR launches faster
                        • reveal="interaction" — prevents model-viewer rendering the
                          3D scene in the background (saves GPU, avoids visual glitch)
                        • ar-scale="fixed" — model appears at real-world scale, not
                          device-scaled, for instant correct placement
                        • environment-image="neutral" — fast lighting, no HDR delay
                        • No auto-rotate — thumbnail is PNG, not the 3D viewer
                    -->
                    <model-viewer
                        id="mv-${i}"
                        src="${glbPath}"
                        ${isIOS && l.hasUsdz ? `ios-src="${usdzPath}"` : ''}
                        ar
                        ar-modes="${isIOS ? 'quick-look webxr' : 'scene-viewer webxr'}"
                        ar-placement="floor"
                        ar-scale="fixed"
                        loading="${i === 0 ? 'eager' : 'lazy'}"
                        reveal="interaction"
                        environment-image="neutral"
                        shadow-intensity="1.2"
                        shadow-softness="0.8"
                        exposure="1.1"
                        camera-controls
                        touch-action="pan-y"
                    ></model-viewer>

                    <!-- Spinner + progress bar shown while GLB loads -->
                    <div class="ar-loading" id="arload-${i}">
                        <div class="loader-ring"></div>
                        <div class="loader-bar-track">
                            <div class="loader-bar-fill" id="bar-${i}"></div>
                        </div>
                        <div class="loader-label" id="lbl-${i}">Loading model…</div>
                    </div>

                    <div class="ar-badge" id="badge-${i}">✦ AR Ready</div>
                </div>

                <div class="landmark-info">
                    <div class="landmark-name">${l.name}</div>
                    <div class="landmark-city">${l.city}</div>
                    <!--
                        ✅ AR FIX: The button itself calls activateAR() inline.
                        On Android Scene Viewer, activateAR() MUST be called
                        synchronously within the user's tap gesture — any async
                        await/setTimeout breaks the gesture chain and AR won't open.
                        We handle this with the data-ready flag checked synchronously.
                    -->
                    <button class="ar-btn" id="arbtn-${i}" onclick="launchAR(${i})">
                        <span>🪐</span> View in Real World
                    </button>
                </div>
            `;

            grid.appendChild(card);

            // Dot indicator
            const dot = document.createElement('div');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dotsEl.appendChild(dot);
        });

        // ─── Per-card state ────────────────────────────────────────────────────
        // Stored outside so launchAR() (global) can access it synchronously
        const state = {};  // state[i] = { mv, ready, loading }

        requestAnimationFrame(() => {
            landmarks.forEach((l, i) => {
                const mv     = document.getElementById(`mv-${i}`);
                const arload = document.getElementById(`arload-${i}`);
                const bar    = document.getElementById(`bar-${i}`);
                const lbl    = document.getElementById(`lbl-${i}`);
                const badge  = document.getElementById(`badge-${i}`);
                const btn    = document.getElementById(`arbtn-${i}`);

                state[i] = { mv, arload, bar, lbl, badge, btn, ready: false, loading: false };

                // ✅ Download progress → update bar
                mv.addEventListener('progress', (e) => {
                    const pct = Math.round(e.detail.totalProgress * 100);
                    if (bar) bar.style.width = pct + '%';
                    if (lbl) lbl.textContent = `Loading… ${pct}%`;
                });

                // ✅ Model ready → mark state, show badge, hide spinner
                mv.addEventListener('load', () => {
                    state[i].ready   = true;
                    state[i].loading = false;
                    arload.classList.remove('show');
                    badge.classList.add('visible');

                    // ✅ If user already tapped while loading, launch AR now
                    if (state[i].pendingAR) {
                        state[i].pendingAR = false;
                        mv.activateAR();
                    }
                });

                mv.addEventListener('error', () => {
                    state[i].loading = false;
                    arload.classList.remove('show');
                    if (lbl) lbl.textContent = 'Model unavailable';
                    btn.disabled = true;
                    btn.textContent = 'Unavailable';
                });
            });
        });

        // ─── Global AR launcher — called synchronously from onclick ───────────
        // ✅ KEY: Must be synchronous in the tap gesture for Android Scene Viewer.
        // We set pendingAR=true if model isn't ready, then activateAR() fires
        // automatically from the 'load' handler above.
        function launchAR(i) {
            const s = state[i];
            if (!s) return;

            if (s.ready) {
                // Model loaded → launch AR immediately (stays in gesture chain)
                s.mv.activateAR();
            } else if (!s.loading) {
                // Not yet loading → trigger download + show spinner
                s.loading    = true;
                s.pendingAR  = true;
                s.mv.setAttribute('loading', 'eager');
                s.arload.classList.add('show');
            } else {
                // Already loading → just mark pending, spinner already showing
                s.pendingAR = true;
            }
        }

        // ─── Scroll dot sync ──────────────────────────────────────────────────
        const dots = dotsEl.querySelectorAll('.dot');

        grid.addEventListener('scroll', () => {
            const center = grid.scrollLeft + grid.clientWidth / 2;
            let closest = 0, minDist = Infinity;
            grid.querySelectorAll('.landmark-card').forEach((card, i) => {
                const dist = Math.abs((card.offsetLeft + card.offsetWidth / 2) - center);
                if (dist < minDist) { minDist = dist; closest = i; }
            });
            dots.forEach((d, i) => d.classList.toggle('active', i === closest));
        }, { passive: true });
    </script>
</body>
</html>
